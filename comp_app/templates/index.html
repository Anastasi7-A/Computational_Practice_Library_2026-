<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог Библиотеки</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .book-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
            border: none;
            border-radius: 10px;
        }
        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        .cover-img {
            height: 320px;
            object-fit: cover;
            border-radius: 10px 10px 0 0;
        }
        .card-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        a { text-decoration: none; color: inherit; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5 shadow">
    <div class="container">
        <a class="navbar-brand" href="/">Факультетская Библиотека</a>
        <div class="ms-auto">
            <a href="/login_test" class="btn btn-sm btn-outline-light">Тест: Войти</a>
            <a href="/logout_test" class="btn btn-sm btn-outline-danger">Выйти</a>
        </div>
    </div>
</nav>

<div class="container">
    <h1 class="text-center mb-5">Каталог книг</h1>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
        {% for book in books %}
        <div class="col">
            <a href="{{ url_for('books.book_detail', book_id=book.book_id) }}">
                <div class="card h-100 book-card shadow-sm">
                    <!-- Логика картинки -->
                    {% if book.cover_path %}
                        <img src="{{ url_for('static', filename='covers/' + book.cover_path) }}" class="card-img-top cover-img" alt="{{ book.title }}">
                    {% else %}
                        <img src="{{ url_for('static', filename='covers/default.jpg') }}" class="card-img-top cover-img" alt="Обложка отсутствует">
                    {% endif %}

                    <div class="card-body text-center">
                        <div class="card-title">{{ book.title }}</div>
                        <div class="text-muted">{{ book.author }}</div>
                    </div>
                </div>
            </a>
        </div>
        {% endfor %}
    </div>
</div>

<footer class="mt-5 py-4 text-center text-muted border-top bg-white">
    © 2026 Онлайн-библиотека факультета
</footer>

</body>
</html>
