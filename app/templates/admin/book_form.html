<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ 'Редактирование' if book else 'Добавление' }} книги</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5 pb-5">
    <h2>{{ 'Редактировать книгу' if book else 'Новая книга' }}</h2>

    <form method="POST" enctype="multipart/form-data" class="card p-4 shadow-sm">
        <div class="mb-3">
            <label class="form-label">Название</label>
            <input type="text" name="title" class="form-control" value="{{ book.title if book else '' }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Автор</label>
            <input type="text" name="author" class="form-control" value="{{ book.author if book else '' }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Издание</label>
            <input type="text" name="edition" class="form-control" value="{{ book.edition if book else '' }}" placeholder="Например: 2-е издание, исправленное" required>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Год</label>
                <input type="number" name="year" class="form-control" value="{{ book.book_year if book else '' }}" required>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Жанр</label>
                <select name="genre_id" class="form-select">
                    {% for genre in genres %}
                    <option value="{{ genre.genre_id }}"
                        {% if book and book.genre_id == genre.genre_id %}selected{% endif %}>
                        {{ genre.genre_name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Всего экземпляров</label>
            <input type="number" name="total_copies" class="form-control" value="{{ book.total_copies if book else '' }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Обложка (оставьте пустым, если не хотите менять)</label>
            {% if book and book.cover_path %}
                <div class="mb-2">
                    <img src="{{ url_for('static', filename='covers/' + book.cover_path) }}" width="100" class="rounded shadow-sm">
                </div>
            {% endif %}
            <input type="file" name="cover" class="form-control" accept="image/*">
        </div>

        <div class="mb-3">
            <label class="form-label">Описание</label>
            <textarea name="description" class="form-control" rows="3">{{ book.book_description if book else '' }}</textarea>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
                {{ 'Сохранить изменения' if book else 'Добавить книгу' }}
            </button>
            <a href="/admin/books" class="btn btn-outline-secondary">Отмена</a>
        </div>
    </form>
</div>
</body>
</html>
