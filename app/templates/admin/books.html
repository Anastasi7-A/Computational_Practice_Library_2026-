<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Управление книгами</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Список книг</h2>
        <a href="/admin/books/add" class="btn btn-success">+ Добавить книгу</a>
    </div>

    <table class="table table-bordered bg-white shadow-sm">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Название</th>
                <th>Автор</th>
                <th>Кол-во</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody>
            {% for book in books %}
            <tr>
                <td>{{ book.book_id }}</td>
                <td>{{ book.title }}</td>
                <td>{{ book.author }}</td>
                <td>{{ book.available_copies }} / {{ book.total_copies }}</td>
                <td>
                    <!-- Кнопка Изменить -->
                    <a href="/admin/books/edit/{{ book.book_id }}" class="btn btn-sm btn-warning me-1">Изменить</a>

                    <!-- Кнопка Удалить -->
                    <a href="/admin/books/delete/{{ book.book_id }}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('Удалить эту книгу?')">Удалить</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <a href="/admin" class="btn btn-secondary">Назад</a>
</div>
</body>
</html>
